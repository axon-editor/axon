<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/png" href="%BASE_URL%axon.png" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'self' blob: data: axon:; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data: blob: axon:; media-src 'self' https: data: blob: axon:; font-src 'self' data: blob: axon:; connect-src 'self' ws: http://127.0.0.1:* http://localhost:*; worker-src 'self' blob:; frame-src 'self' http://127.0.0.1:* http://localhost:*; object-src 'none'; base-uri 'none'; form-action 'none';"
        />
        <title>Axon</title>
        <style>
            html,
            body {
                width: 100%;
                height: 100%;
                margin: 0;
                overflow: hidden;
                background: #080b11;
            }

            /*
             * Electron can restore or resize the native window before React has
             * completed a fresh layout pass. Pinning the mount node to the
             * viewport makes the workbench follow the actual webContents size,
             * so the status bar stays attached to the bottom edge instead of
             * leaving a stale body-height band below the app.
             */
            #root {
                position: fixed;
                inset: 0;
                width: 100vw;
                height: 100dvh;
                min-height: 100vh;
                overflow: hidden;
                background: #080b11;
            }

            .axon-splash {
                position: fixed;
                inset: 0;
                z-index: 9999;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 24px;
                overflow: hidden;
                background:
                    radial-gradient(circle at 50% 42%, rgba(128, 200, 224, 0.025), transparent 28%),
                    linear-gradient(180deg, #10131b 0%, #080a10 100%);
                color: #e6ebf5;
                font-family:
                    Inter,
                    ui-sans-serif,
                    system-ui,
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    sans-serif;
                pointer-events: all;
            }

            .axon-splash__mark-wrap {
                position: relative;
                display: grid;
                place-items: center;
                width: 156px;
                height: 172px;
            }

            .axon-splash__aura {
                position: absolute;
                width: 138px;
                height: 138px;
                border: 1px solid rgba(128, 200, 224, 0.12);
                border-radius: 999px;
                background: rgba(128, 200, 224, 0.01);
                filter: blur(0.2px);
                opacity: 0;
                transform: scale(0.72);
                animation: axonAuraIn 1150ms cubic-bezier(0.2, 0.86, 0.22, 1) forwards;
            }

            .axon-splash__mark {
                position: relative;
                z-index: 2;
                width: 112px;
                height: 112px;
                object-fit: contain;
                opacity: 0;
                filter: drop-shadow(0 14px 28px rgba(0, 0, 0, 0.36));
                transform: scale(0.58);
                animation: axonMarkIn 1180ms cubic-bezier(0.18, 0.9, 0.2, 1.08) forwards;
            }

            .axon-splash__wordmark {
                display: flex;
                min-height: 38px;
                flex-direction: column;
                align-items: center;
                gap: 7px;
            }

            .axon-splash__title {
                display: flex;
                min-height: 30px;
                align-items: center;
                justify-content: center;
                gap: 8px;
                font-size: 22px;
                font-weight: 600;
                letter-spacing: 0;
                color: #f5f8ff;
            }

            .axon-splash__title span {
                display: inline-block;
                opacity: 0;
                transform: translateY(8px);
                text-shadow: 0 0 10px rgba(128, 200, 224, 0.08);
                animation: axonLetterIn 520ms cubic-bezier(0.2, 0.86, 0.22, 1) forwards;
            }

            .axon-splash__wordline {
                width: 88px;
                height: 1px;
                border-radius: 999px;
                background: linear-gradient(
                    90deg,
                    transparent,
                    rgba(128, 200, 224, 0.68),
                    transparent
                );
                opacity: 0;
                transform: scaleX(0);
                transform-origin: center;
                animation: axonWordLineIn 900ms 2.02s cubic-bezier(0.2, 0.86, 0.22, 1) forwards;
            }

            @keyframes axonMarkIn {
                0% {
                    opacity: 0;
                    transform: scale(0.58);
                }
                58% {
                    opacity: 1;
                    transform: scale(1.08);
                }
                100% {
                    opacity: 1;
                    transform: scale(1);
                }
            }

            @keyframes axonAuraIn {
                0% {
                    opacity: 0;
                    transform: scale(0.72);
                }
                45% {
                    opacity: 1;
                }
                100% {
                    opacity: 0.72;
                    transform: scale(1);
                }
            }

            @keyframes axonLetterIn {
                0% {
                    opacity: 0;
                    transform: translateY(8px);
                }
                100% {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            @keyframes axonWordLineIn {
                0% {
                    opacity: 0;
                    transform: scaleX(0);
                }
                100% {
                    opacity: 1;
                    transform: scaleX(1);
                }
            }

            #axon-window-drag-strip {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                height: 36px;
                z-index: 10000;
                -webkit-app-region: drag;
            }

            body.axon-react-ready #axon-window-drag-strip {
                display: none;
            }
        </style>
    </head>
    <body>
        <div id="axon-window-drag-strip" aria-hidden="true"></div>
        <div id="root">
            <div class="axon-splash" role="status" aria-label="Opening Axon">
                <div class="axon-splash__mark-wrap">
                    <div class="axon-splash__aura"></div>
                    <img class="axon-splash__mark" src="%BASE_URL%axon.png" alt="" />
                </div>
                <div class="axon-splash__wordmark" aria-hidden="true">
                    <div class="axon-splash__title">
                        <span style="animation-delay: 1.25s">A</span>
                        <span style="animation-delay: 1.41s">X</span>
                        <span style="animation-delay: 1.57s">O</span>
                        <span style="animation-delay: 1.73s">N</span>
                    </div>
                    <div class="axon-splash__wordline"></div>
                </div>
            </div>
        </div>
        <script type="module" src="/main.tsx"></script>
    </body>
</html>
