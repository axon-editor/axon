name: Release Axon

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish when running this workflow manually."
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  desktop:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS x64
            # GitHub has moved the standard Intel macOS lane away from the old
            # macos-13 label. Using the explicit Intel label keeps the x64 DMG
            # available for older MacBooks instead of leaving the release job
            # stuck forever waiting for a deprecated runner pool.
            runner: macos-15-intel
            command: npm --workspace axon run dist:mac:x64
          - name: macOS arm64
            # Keep this on the explicit Apple Silicon runner label so the
            # language-server bundler sees process.arch=arm64. If this job ran
            # on an Intel runner while electron-builder cross-packaged arm64,
            # the app could accidentally ship x64 managed server binaries in an
            # arm64 DMG.
            runner: macos-15
            command: npm --workspace axon run dist:mac:arm64
          - name: Windows
            runner: windows-latest
            command: npm --workspace axon run dist:win
          - name: Linux
            runner: ubuntu-latest
            command: npm --workspace axon run dist:linux

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/core/go.mod
          cache-dependency-path: services/core/go.sum

      - name: Install editor dependencies
        run: npm ci

      - name: Ensure native build binding
        run: node apps/editor/scripts/ensure-native-build-binding.mjs

      - name: Bundle managed language servers
        run: npm --workspace axon run build:language-servers
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Verify managed language server bundles
        run: node apps/editor/scripts/verify-language-servers.mjs

      - name: Build packaged desktop target
        run: ${{ matrix.platform.command }}
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          # Tag pushes already provide the release tag through github.ref_name.
          # Manual runs need an explicit tag name so we can create or update the
          # same draft release without depending on the workflow branch name.
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || inputs.release_tag }}
          draft: true
          body_path: docs/releases/${{ github.ref_type == 'tag' && github.ref_name || inputs.release_tag }}.md
          # Rebuilding the same patch release is intentional while Axon is
          # still unsigned and personal-use only. The release page should keep
          # the selected tag URL stable, but the installer assets must be
          # replaced when we fix packaging or updater behavior inside that same
          # version.
          overwrite_files: true
          fail_on_unmatched_files: false
          files: |
            apps/editor/release/*.dmg
            apps/editor/release/*.zip
            apps/editor/release/*.exe
            apps/editor/release/*.AppImage
            apps/editor/release/*.deb
            apps/editor/release/*.blockmap
            apps/editor/release/*.yml
